async function loadConversation(convId) {
  try {
    const res = await getConversation(convId);
    state.activeConv = convId;
    state.messages = res.messages;
    // 🔥 清除该对话对应智能体的未读标记
    const conv = state.conversations.find(c => c.id === convId);
    if (conv && state.unreadAgents[conv.agent_id]) {
      delete state.unreadAgents[conv.agent_id];
    }
    render();
    if (window.innerWidth <= 768) closeMobileSidebar();
    // 滚动到底部
    setTimeout(() => {
      const msgsEl = $('#chatMessages');
      if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
    }, 50);
  } catch (e) {
    showToast('加载对话失败', 'error');
  }
}

// ==================== 消息并行发送（允许多条消息同时发送） ====================
let _inflightCount = 0;       // 当前进行中的请求数（用于显示"正在输入"动画）
let _currentSession = 0;      // 会话标识，切换智能体时递增以丢弃过期响应

// 🔥 停止当前正在进行的请求（切换智能体时调用）
function stopChat() {
  _abortCurrentRequest();
  _currentSession++;          // 让所有进行中的响应自动丢弃
  _inflightCount = 0;
  // 移除尚未获得回复的用户消息
  state.messages = state.messages.filter(m => m.role !== 'user' || !m._pending);
  render();
  const inp = $('#chatInput');
  if (inp) inp.focus();
}

async function handleSend() {
  const input = $('#chatInput');
  if (!input || !input.value.trim() || !state.selectedAgent) return;

  const msg = input.value.trim();
  input.value = '';
  input.focus();

  const msgId = Date.now().toString();
  const nowIso = _getClientNow();
  resetInitiativeStep(); // 用户发了消息，重置阶梯回 10 分钟

  // 立即显示用户消息（标记 _pending，切换智能体时清理未回复的）
  state.messages = [...state.messages, { id: msgId, role: 'user', content: msg, created_at: nowIso, _pending: true }];

  _inflightCount++;
  const mySession = _currentSession;
  render();
  setTimeout(() => {
    const msgsEl = $('#chatMessages');
    if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
  }, 50);

  // 捕获当前智能体信息，直接发起独立请求（不等其他消息）
  const selectedAgent = state.selectedAgent;
  const agentId = selectedAgent.id;
  const activeConv = state.activeConv;
  const searchEnabled = _getSearchEnabled();

  // 🔥 不再使用队列——每条消息独立并行发送
  (async () => {
    try {
      _currentAbortController = new AbortController();
      const res = await sendMsg({
        agent_id: agentId,
        conversation_id: activeConv,
        message: msg,
        enable_search: searchEnabled,
        client_now: _getClientNow(),
        location_city: state.geoCity || undefined,
        latitude: state.geoLat || undefined,
        longitude: state.geoLng || undefined,
      });

      // 🔥 会话已切换或已被中止，丢弃过期响应
      if (mySession !== _currentSession || !_currentAbortController) return;

      // 去掉用户消息的 _pending 标记，追加 AI 回复
      state.messages = state.messages.map(m =>
        m.id === msgId ? { ...m, _pending: false } : m
      );
      state.messages = [...state.messages, { id: res.message_id, role: 'assistant', content: res.reply, created_at: _getClientNow() }];

      if (!state.activeConv) {
        state.activeConv = res.conversation_id;
        try {
          const convsRes = await listConversations(agentId);
          mergeConvs(convsRes.conversations);
        } catch (e) {}
      }

      render();
      setTimeout(() => {
        const msgsEl = $('#chatMessages');
        if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
      }, 50);

      // 智能体回复后，延迟一小段时间发起跟进消息
      setTimeout(() => {
        _triggerFollowUpInitiative(agentId, activeConv);
      }, 30000);
    } catch (e) {
      if (e.name === 'AbortError') {
        return; // 用户切换智能体导致取消，静默处理
      }
      showToast('发送失败: ' + e.message, 'error');
      state.messages = state.messages.filter(m => m.id !== msgId);
    } finally {
      _inflightCount = Math.max(0, _inflightCount - 1);
      // 所有请求都完成时刷新一次 UI
      if (_inflightCount === 0) {
        render();
        setTimeout(() => {
          const msgsEl = $('#chatMessages');
          if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
          const inp = $('#chatInput');
          if (inp) inp.focus();
        }, 50);
      }
    }
  })();
}

// ==================== 智能体主动消息（阶梯时间，按智能体独立） ====================
const INITIATIVE_STEPS = [
  { min: 8 * 60000, max: 12 * 60000 },         // ~10 min（8~12分随机）
  { min: 25 * 60000, max: 35 * 60000 },        // ~30 min（25~35分随机）
  { min: 55 * 60000, max: 65 * 60000 },        // ~1 hour（55~65分随机）
  { min: 110 * 60000, max: 130 * 60000 },      // ~2 hours（110~130分随机）
  { min: 290 * 60000, max: 310 * 60000 },      // ~5 hours（290~310分随机）
  { min: 1400 * 60000, max: 1480 * 60000 },    // ~24 hours（1400~1480分随机）
];

function _nextInterval(step) {
  const s = INITIATIVE_STEPS[Math.min(step, INITIATIVE_STEPS.length - 1)];
  return s.min + Math.random() * (s.max - s.min);
}

// 🔥 计算距离下一次起床还有多少毫秒
function _msUntilWake(wakeHour) {
  const now = new Date();
  let wake = new Date(now);
  wake.setHours(wakeHour, 0, 0, 0);
  if (wake <= now) wake.setDate(wake.getDate() + 1); // 已经是今天起床时间之后 → 明天
  return wake.getTime() - now.getTime();
}

// 🔥 判断指定智能体当前是否在休眠
function _isAgentSleeping(agentId) {
  const sw = state.sleepWindows[agentId];
  if (!sw) return false; // 未加载 → 不阻止
  const h = new Date().getHours();
  if (sw.sleep_start <= sw.sleep_end) {
    return sw.sleep_start <= h && h < sw.sleep_end;
  } else {
    return h >= sw.sleep_start || h < sw.sleep_end;
  }
}

// 🔥 直接 DOM 更新未读徽章（不触发完整 render，避免清除用户正在输入的文字）
function _updateUnreadBadgeDOM(agentId, count) {
  const card = document.querySelector(`.agent-card[data-agent-id="${CSS.escape(agentId)}"]`);
  if (!card) return;
  const nameEl = card.querySelector('.agent-name');
  if (!nameEl) return;
  // 移除已有徽章
  const existing = nameEl.querySelector('.unread-badge');
  if (existing) existing.remove();
  // 添加新徽章（如果 count > 0）
  if (count > 0) {
    const badge = document.createElement('span');
    badge.className = 'unread-badge';
    badge.textContent = count;
    nameEl.appendChild(document.createTextNode(' '));
    nameEl.appendChild(badge);
  }
}

function _isInitOn(agentId) {
  return _uget(`initiative-${agentId}`) !== 'off';
}
function _setInitOn(agentId, on) {
  _uset(`initiative-${agentId}`, on ? 'on' : 'off');
}
function _initState(agentId) {
  if (!state.initiative[agentId]) {
    state.initiative[agentId] = { timerId: null, step: 0, busy: false, lastMsgTime: Date.now() };
  }
  return state.initiative[agentId];
}

// 停止单个智能体的定时器
function stopAgentTimer(agentId) {
  const s = state.initiative[agentId];
  if (s && s.timerId) { clearTimeout(s.timerId); s.timerId = null; s.busy = false; }
}
// 停止所有定时器（退出登录时用）
function stopAllInitiativeTimers() {
  for (const id of Object.keys(state.initiative)) stopAgentTimer(id);
  state.initiative = {};
}

// 核心：异步执行一次主动消息检查（用于指定智能体）
async function _doInitiativeFor(agentId) {
  const s = _initState(agentId);
  if (s.busy) return false;

  // 🔥 休眠中不发送主动消息
  if (_isAgentSleeping(agentId)) {
    console.log(`🌙 [主动] 智能体 ${agentId} 休眠中，跳过`);
    return false;
  }

  // 如果该智能体是当前选中的 → 检查是否有进行中的请求；否则独立运行
  const isCurrent = state.selectedAgent?.id === agentId;
  if (isCurrent && _inflightCount > 0) return false;
  if (Date.now() - s.lastMsgTime < 60000) return false;

  const agent = state.agents.find(a => a.id === agentId);
  if (!agent) return false;

  s.busy = true;
  try {
    // 主动消息只在已有对话中追加，不创建新对话
    let convId = null;
    if (isCurrent) {
      // 当前智能体：必须有活跃对话才发送
      convId = state.activeConv || null;
    } else {
      // 非当前智能体：找最近的已有对话，没有则不发送
      try {
        const convsRes = await listConversations(agentId);
        const convs = convsRes.conversations || [];
        if (convs.length > 0) {
          convId = convs[0].id;
        }
      } catch (e) {}
    }
    // 没有已有对话 → 不发送主动消息
    if (!convId) {
      s.busy = false;
      return false;
    }

    const res = await getInitiativeMsg({
      agent_id: agentId,
      conversation_id: convId,
      enable_search: _getSearchEnabled(),
      client_now: _getClientNow(),
      location_city: state.geoCity || undefined,
      latitude: state.geoLat || undefined,
      longitude: state.geoLng || undefined,
    });

    if (res.messages && res.messages.length > 0) {
      s.lastMsgTime = Date.now();
      s.step = Math.min(s.step + 1, INITIATIVE_STEPS.length - 1);

      // 🔥 保存主动消息到数据库，确保卡片时间正确更新
      let savedMsgs = res.messages;
      try {
        const saveRes = await batchCreateMessages(convId, res.messages.map(m => ({ role: 'assistant', content: m.content })));
        if (saveRes.messages) savedMsgs = saveRes.messages;
        // 刷新对话列表以获取最新的 updated_at
        const convsRes = await listConversations();
        mergeConvs(convsRes.conversations);
      } catch (e) {
        console.error('保存主动消息失败:', e);
      }

      // 🔥 异步等待后重新检查：用户可能在等待期间切换了智能体
      const nowCurrent = state.selectedAgent?.id === agentId;

      if (nowCurrent) {
        if (_inflightCount > 0) { s.busy = false; return false; }
        for (const m of savedMsgs) {
          state.messages = [...state.messages, { id: m.id, role: 'assistant', content: m.content, created_at: m.created_at || _getClientNow() }];
        }
        state.lastMsgTime = s.lastMsgTime;
        render();
        setTimeout(() => {
          const msgsEl = $('#chatMessages');
          if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
        }, 50);
      } else {
        // 🔥 非当前智能体：标记未读（直接操作 DOM，避免整体重绘清除用户输入）
        state.unreadAgents[agentId] = (state.unreadAgents[agentId] || 0) + savedMsgs.length;
        _updateUnreadBadgeDOM(agentId, state.unreadAgents[agentId]);
      }
      s.busy = false;
      return true;
    }
    s.step = Math.min(s.step + 1, INITIATIVE_STEPS.length - 1);
  } catch (e) {
    /* 静默 */
  }
  s.busy = false;
  return false;
}

// 为单个智能体调度下一轮
function _scheduleFor(agentId) {
  stopAgentTimer(agentId);
  if (!_isInitOn(agentId)) return;

  const s = _initState(agentId);

  // 🔥 判断是否在休眠窗口
  const sw = state.sleepWindows[agentId];
  if (sw && _isAgentSleeping(agentId)) {
    // 休眠中：调度到起床时间再唤醒
    const wakeDelay = _msUntilWake(sw.sleep_end);
    console.log(`🌙 智能体 ${agentId} 休眠中，${Math.round(wakeDelay / 60000)} 分钟后唤醒`);
    s.timerId = setTimeout(async () => {
      // 醒来后刷新睡眠窗口（用户画像可能已变化）
      try {
        const updated = await getSleepWindow(agentId);
        state.sleepWindows[agentId] = { sleep_start: updated.sleep_start, sleep_end: updated.sleep_end, is_sleep_time: updated.is_sleep_time };
      } catch (e) {}
      s.step = 0; // 新的一天，重设 step
      _scheduleFor(agentId);
    }, wakeDelay);
    return;
  }

  const delay = _nextInterval(s.step);
  s.timerId = setTimeout(async () => {
    await _doInitiativeFor(agentId);
    _scheduleFor(agentId);
  }, delay);
}

// 启动单个智能体的主动消息
function startAgentInitiative(agentId) {
  const s = _initState(agentId);
  s.step = 0;
  s.lastMsgTime = Date.now();
  _scheduleFor(agentId);
}

// 为所有在 agents 列表中且开启了的智能体启动
function startAllInitiativeTimers() {
  for (const a of state.agents) {
    if (_isInitOn(a.id)) startAgentInitiative(a.id);
  }
}

async function triggerButlerIntros() {
  if (_butlerIntroBusy) { console.log('[ButlerIntro] 忙，跳过'); return; }
  if (!state.currentUser) { console.log('[ButlerIntro] 未登录，跳过'); return; }
  const butlers = state.agents.filter(a => BUTLER_IDS.includes(a.id));
  if (butlers.length === 0) { console.log('[ButlerIntro] 未找到管家智能体', state.agents.map(a=>a.id)); return; }

  _butlerIntroBusy = true;
  const introUnreadCounts = {};
  try {
    for (const butler of butlers) {
      const flagKey = `ai-chat-butler-intro-${state.currentUser.username}-${butler.id}`;
      const storedVersion = localStorage.getItem(flagKey);
      console.log(`[ButlerIntro] ${butler.name} flagKey=${flagKey} storedVersion=${storedVersion} INTRO_VERSION=${INTRO_VERSION}`);

      if (storedVersion === INTRO_VERSION) { console.log(`[ButlerIntro] ${butler.name} 已生成过，跳过`); continue; }

      console.log(`[ButlerIntro] 开始为 ${butler.name} 写入介绍文案...`);
      try {
        const msgs = BUTLER_INTRO_MESSAGES[butler.id];
        if (!msgs || msgs.length === 0) {
          console.warn(`[ButlerIntro] ${butler.name} 无预写文案，跳过`);
          continue;
        }

        const existingConvs = state.conversations.filter(c =>
          c.agent_id === butler.id && c.title === '初次见面'
        );
        for (const ec of existingConvs) {
          try { await deleteConversationSilent(ec.id); } catch (_) {}
        }

        const convRes = await createConversation({ agent_id: butler.id, title: '初次见面' });
        const convId = convRes.conversation.id;

        // 🔥 直写预定义消息（无 AI 调用，瞬间完成）
        const batchRes = await batchCreateMessages(convId, msgs.map(content => ({ role: 'assistant', content })));

        localStorage.setItem(flagKey, INTRO_VERSION);
        introUnreadCounts[butler.id] = batchRes.messages.length;
        const s = _initState(butler.id);
        s.lastMsgTime = Date.now();
        console.log(`[ButlerIntro] ${butler.name} 介绍写入成功: ${batchRes.messages.length} 条消息`);
      } catch (e) {
        console.error(`[ButlerIntro] ${butler.name} 介绍写入失败:`, e.message, e);
      }
    }

    console.log(`[ButlerIntro] 所有管家处理完毕，introUnreadCounts=`, introUnreadCounts);

    try {
      const allRes = await listConversations();
      state.conversations = allRes.conversations || [];
      console.log(`[ButlerIntro] 刷新对话列表: ${state.conversations.length} 个对话`);
    } catch (e) {
      console.error(`[ButlerIntro] 刷新对话列表失败:`, e.message);
    }

    if (Object.keys(introUnreadCounts).length > 0) {
      for (const [agentId, count] of Object.entries(introUnreadCounts)) {
        state.unreadAgents[agentId] = (state.unreadAgents[agentId] || 0) + count;
      }
      console.log(`[ButlerIntro] 未读计数已设置:`, state.unreadAgents);
    }
  } finally {
    _butlerIntroBusy = false;
    console.log(`[ButlerIntro] 完成`);
  }
}

// 用户对当前智能体发了消息 → 重置该智能体的阶梯
function resetInitiativeStep() {
  const id = state.selectedAgent?.id;
  if (!id) return;
  const s = _initState(id);
  s.step = 0;
  s.lastMsgTime = Date.now();
  state.lastMsgTime = s.lastMsgTime;
  _scheduleFor(id);
}

// 🔥 用户发消息后，智能体主动跟进（根据时间问候/关心，联网时就带热点）
let _followUpBusy = {};
async function _triggerFollowUpInitiative(agentId, convId) {
  if (_followUpBusy[agentId]) return;
  if (!agentId) return;

  // 🔥 休眠中不发送主动消息
  if (_isAgentSleeping(agentId)) {
    console.log(`🌙 [跟进] 智能体 ${agentId} 休眠中，跳过跟进`);
    return;
  }

  _followUpBusy[agentId] = true;
  try {
    const res = await getInitiativeMsg({
      agent_id: agentId,
      conversation_id: convId || null,
      enable_search: _getSearchEnabled(),
      client_now: _getClientNow(),
      location_city: state.geoCity || undefined,
      latitude: state.geoLat || undefined,
      longitude: state.geoLng || undefined,
    });
    if (res.messages && res.messages.length > 0) {
      const nowIso = _getClientNow();
      for (const m of res.messages) {
        state.messages = [...state.messages, { id: m.id, role: 'assistant', content: m.content, created_at: nowIso }];
      }
      const s = _initState(agentId);
      s.lastMsgTime = Date.now();
      state.lastMsgTime = s.lastMsgTime;
      render();
      setTimeout(() => {
        const msgsEl = $('#chatMessages');
        if (msgsEl) msgsEl.scrollTop = msgsEl.scrollHeight;
      }, 50);
    }
  } catch (e) { /* 静默 */ }
  _followUpBusy[agentId] = false;
}

// 切换当前智能体的主动消息开关
function toggleInitiative() {
  const id = state.selectedAgent?.id;
  if (!id) return;
  const on = !_isInitOn(id);
  _setInitOn(id, on);
  if (on) startAgentInitiative(id);
  else stopAgentTimer(id);
  render();
}

async function deleteAgentConfirm(id) {
  const agent = state.agents.find(a => a.id === id);
  if (!agent || !confirm(`确定删除智能体「${agent.name}」吗？所有相关对话也会被删除。`)) return;
  try {
    await deleteAgent(id);
    stopAgentTimer(id);
    delete state.initiative[id];
    _uset(`initiative-${id}`, null);
    if (state.selectedAgent?.id === id) {
      state.selectedAgent = null;
      state.activeConv = null;
      state.messages = [];
      applyTheme();
    }
    await loadAgents();
    showToast('已删除', 'success');
  } catch (e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

async function deleteConvConfirm(id) {
  if (!confirm('确定删除这个对话吗？')) return;
  try {
    await deleteConversation(id);
    if (state.activeConv === id) {
      state.activeConv = null;
      state.messages = [];
    }
    // 从全局列表中移除已删除的对话（无需重新请求）
    state.conversations = state.conversations.filter(c => c.id !== id);
    // 如果清空了该智能体的最后对话，重新加载全部对话列表
    if (!state.conversations.some(c => c.agent_id === state.selectedAgent?.id)) {
      try {
        const allRes = await listConversations();
        state.conversations = allRes.conversations || [];
      } catch (e) {}
    }
    render();
    showToast('已删除', 'success');
  } catch (e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.querySelector('#btnCancelConfig').onclick = () => overlay.remove();
  overlay.querySelector('#btnSaveConfig').onclick = async () => {
    const key = overlay.querySelector('#cKey').value.trim();
    const base = overlay.querySelector('#cBase').value.trim();
    const model = overlay.querySelector('#cModel').value.trim();
    try {
      await saveConfig({ api_key: key, api_base: base, model });
      overlay.remove();
      showToast('API 配置已保存', 'success');
    } catch (e) {
      alert('保存失败: ' + e.message);
    }
  };
}

// ==================== 用户画像弹窗 ====================
async function showProfileModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="width:560px;max-height:80vh;overflow-y:auto">
      <h2>🧠 用户画像</h2>
      <p class="modal-desc">AI 从你的对话中自动提取的个人偏好和记忆</p>
      <div id="profileModalContent" class="empty-state">加载中...</div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

  const content = overlay.querySelector('#profileModalContent');
  const agentId = state.selectedAgent?.id || '';
  try {
    const res = await getUserProfile(agentId);
    const { memories, profile_text, total_memories, extraction_logs } = res;

    const catNames = {
      name: '👤 称呼', interests: '🎯 兴趣爱好', personality_traits: '🧠 性格特点',
      life_context: '🏠 生活背景', preferences: '⭐ 偏好习惯', goals: '🎯 目标计划',
      general: '📌 其他',
    };

    const grouped = {};
    memories.forEach(m => {
      if (!grouped[m.category]) grouped[m.category] = [];
      grouped[m.category].push(m);
    });

    let memHTML = '';
    Object.entries(grouped).forEach(([cat, items]) => {
      memHTML += `<div class="profile-cat">${catNames[cat] || cat}</div>`;
      items.forEach(m => {
        memHTML += `
          <div class="profile-item">
            <span class="profile-item-key">${esc(m.key)}</span>
            <span class="profile-item-val">${esc(m.value)}</span>
            <span class="profile-item-del" data-del-mem="${m.id}" title="删除">✕</span>
          </div>
        `;
      });
    });

    content.innerHTML = `
      ${total_memories > 0 ? `
        <div class="profile-preview" style="max-height:160px">${esc(profile_text) || '暂无结构化画像'}</div>
        <div class="profile-badge">共 ${total_memories} 条记忆</div>
        ${memHTML}
        ${extraction_logs.length > 0 ? '<div class="profile-cat" style="margin-top:16px">📋 最近提取记录</div>' : ''}
        ${extraction_logs.slice(0, 3).map(log => `
          <div class="extract-log">
            <div class="extract-log-time">${formatTime(log.created_at)} · 提取 ${log.extracted_count} 条</div>
            <div class="extract-log-summary">${esc(log.extracted_summary || '')}</div>
          </div>
        `).join('')}
      ` : '<div class="empty-state">🧠 暂无用户画像。<br>多聊聊，AI 会自动了解你，你也可以手动添加信息。</div>'}
      <div class="modal-actions">
        <button class="btn btn-secondary btn-sm" id="btnExtractNowModal">🔍 立即分析所有对话</button>
        <button class="btn btn-secondary btn-sm" id="btnAddMemoryModal">✚ 手动添加</button>
        ${total_memories > 0 ? '<button class="btn btn-secondary btn-sm" id="btnClearMemoriesModal" style="color:var(--error)">🗑️ 清空</button>' : ''}
        <button class="btn btn-secondary btn-sm" id="btnCloseProfile">关闭</button>
      </div>
    `;

    // 绑定事件
    const btnExtract = $('#btnExtractNowModal', overlay);
    if (btnExtract) btnExtract.onclick = async () => {
      btnExtract.textContent = '⏳ 分析中...';
      btnExtract.disabled = true;
      try {
        const result = await extractNow(agentId);
        showToast(result.new_memories > 0 ? `新发现 ${result.new_memories} 条信息` : '没有新发现', result.new_memories > 0 ? 'success' : 'info');
        overlay.remove();
        showProfileModal();
      } catch (e) {
        showToast('提取失败: ' + e.message, 'error');
        overlay.remove();
      }
    };

    const btnAdd = $('#btnAddMemoryModal', overlay);
    if (btnAdd) btnAdd.onclick = () => {
      overlay.remove();
      showAddMemoryModal();
    };

    const btnClear = $('#btnClearMemoriesModal', overlay);
    if (btnClear) btnClear.onclick = async () => {
      if (!confirm('确定清空该智能体的所有用户记忆吗？')) return;
      await clearMemories(agentId);
      overlay.remove();
      showToast('所有记忆已清空', 'success');
    };

    const btnClose = $('#btnCloseProfile', overlay);
    if (btnClose) btnClose.onclick = () => overlay.remove();

    // 删除单条
    $$('[data-del-mem]', overlay).forEach(span => {
      span.onclick = async (e) => {
        e.stopPropagation();
        await deleteMemory(span.dataset.delMem);
        overlay.remove();
        showProfileModal();
        showToast('已删除', 'success');
      };
    });

  } catch (e) {
    content.innerHTML = `<div class="empty-state">加载失败: ${esc(e.message)}</div>`;
  }
}

function showAddMemoryModal(parentEl) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>✚ 手动添加用户信息</h2>
      <label>分类</label>
      <select id="mCat" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius2);background:var(--input);color:var(--text);font-size:14px;font-family:inherit;outline:none">
        <option value="name">👤 称呼</option>
        <option value="interests">🎯 兴趣爱好</option>
        <option value="personality_traits">🧠 性格特点</option>
        <option value="life_context">🏠 生活背景</option>
        <option value="preferences">⭐ 偏好习惯</option>
        <option value="goals">🎯 目标计划</option>
        <option value="general">📌 其他</option>
      </select>
      <label>标签（如：姓名、职业、喜欢的音乐）</label>
      <input type="text" id="mKey" placeholder="例如：职业">
      <label>内容</label>
      <input type="text" id="mVal" placeholder="例如：程序员">
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btnCancelMem">取消</button>
        <button class="btn btn-primary" id="btnSaveMem">添加</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  overlay.querySelector('#btnCancelMem').onclick = () => overlay.remove();
  overlay.querySelector('#btnSaveMem').onclick = async () => {
    const category = overlay.querySelector('#mCat').value;
    const key = overlay.querySelector('#mKey').value.trim();
    const value = overlay.querySelector('#mVal').value.trim();
    if (!key || !value) { alert('请填写标签和内容'); return; }
    try {
      const agentId = state.selectedAgent?.id || '';
      await addMemory({ category, key, value, confidence: 1.0, agent_id: agentId });
      overlay.remove();
      showToast('已添加', 'success');
      // 刷新画像面板
      if (parentEl) {
        loadAndRenderProfile(parentEl);
      }
    } catch (e) {
      alert('添加失败: ' + e.message);
    }
  };
}

// ==================== 启动 ====================
async function initApp() {
  applyTheme();

  // 🔥 currentUser 在 state 初始化时已从 localStorage 恢复
  // 401 拦截器会处理 token 失效的情况，无需额外验证

  if (state.userToken) {
    // 有缓存用户信息 → 加载数据并渲染
    if (state.currentUser) {
      try { await loadAgents(); } catch (_) { /* 401 已由拦截器处理 */ }
      render();
      return;
    }
    // 有 token 但无缓存用户 → 尝试加载，失败则由 401 拦截器自动登出
    try {
      await loadAgents();
      // 加载成功 → 补上用户信息
      try {
        const res = await validateToken();
        if (res.valid && res.user) {
          state.currentUser = res.user;
          _cachedUsername = res.user.username; // 🔒 更新用户隔离缓存
          localStorage.setItem('ai-chat-user', JSON.stringify(res.user));
        }
      } catch (_) {}
    } catch (_) { /* 401 已处理 */ }
    render();
    return;
  }

  // 无 token → 显示登录提示
  render();
}
initApp();
</script>
